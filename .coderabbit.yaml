# CodeRabbit configuration for a Active Plugin Locator plugin repo.
# Keep this lean; add only when it measurably improves signal.

language: en-US

# Keep tone professional and aligned with our workflow.
tone_instructions: >
  You are a senior WordPress plugin engineer, security reviewer, and QA lead.
  Accuracy > coverage. Do not guess. Prefer small patches over rewrites.
  Flag security concerns (caps, nonces, sanitization/escaping), admin-only constraints,
  and performance risks. If evidence is insufficient, recommend the safest fallback.

reviews:
  profile: chill
  high_level_summary: true
  changed_files_summary: true
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true

  auto_review:
    enabled: true
    auto_incremental_review: true

  # Keep focus tight: only review relevant code paths.
  path_filters:
    - "active-plugin-locator.php"
    - "includes/**"
    - "assets/**"
    - "!vendor/**"
    - "!node_modules/**"
    - "!.ddev/**"
    - "!.github/**"

  # Give file-specific guidance where it matters.
  path_instructions:
    - path: "includes/**/*.php"
      instructions: >
        Enforce WordPress conventions and security:
        - capability checks for admin-only operations
        - sanitize all inputs; escape all outputs
        - avoid global namespace pollution; prefer final classes / static init patterns where appropriate
        - no expensive scans on every request; work should run only after activation queue exists
        - do not introduce new features beyond current slice

    - path: "assets/**/*.js"
      instructions: >
        Keep JS minimal and admin-only:
        - no front-end impact, no remote requests
        - avoid adding dependencies
        - ensure accessibility basics (keyboard/ESC close where relevant)
        - do not generate external links

    - path: "assets/**/*.css"
      instructions: >
        Keep CSS scoped to the toast root to avoid wp-admin collisions.

ignore:
  - "vendor/**"
  - "node_modules/**"